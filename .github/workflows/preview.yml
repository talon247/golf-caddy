name: Preview Deploy

on:
  push:
    branches: [v3]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Notify Discord — Announcements (public)
        continue-on-error: true
        run: |
          MSG=$(git log -1 --pretty=format:"%s" 2>/dev/null || echo "New build")
          curl -s -X POST "${{ secrets.DISCORD_ANNOUNCEMENTS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"⛳ **New Build Available**\n$MSG\n${{ steps.deploy.outputs.url }}\"}"

      - name: Notify Discord — Builds (Colony internal)
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.DISCORD_BUILDS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"${{ steps.deploy.outputs.url }}\"}"
